<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horegallu — Name it</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Malayalam:wght@300;400;500&family=Noto+Sans+Devanagari:wght@300;400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --stone:       #C4A882;
      --stone-light: #E8DCCF;
      --stone-dark:  #8B6F52;
      --earth:       #6B4F3A;
      --earth-deep:  #3D2B1F;
      --cream:       #FAF6F0;
      --cream-warm:  #F2EBE0;
      --gold:        #D4A94A;
      --gold-light:  #F0CC7A;
      --gold-bg:     rgba(212,169,74,0.08);
      --sage:        #7A8C6E;
      --terracotta:  #C1654A;
      --text-primary:   #2C2420;
      --text-secondary: #6B5A4E;
      --text-muted:     #9E8A7A;
      --border:      rgba(139,111,82,0.18);
      --shadow:      rgba(60,40,20,0.08);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', sans-serif;
      --font-hw: 'Caveat', cursive;
      --font-ml: 'Noto Sans Malayalam', sans-serif;
      --font-hi: 'Noto Sans Devanagari', sans-serif;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;}
    body{
      font-family:var(--font-b);
      background:var(--cream);
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
    }

    /* bg */
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 75% 55% at 18% 18%, rgba(196,168,130,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 55% 75% at 82% 82%, rgba(193,101,74,0.07) 0%, transparent 60%);
      pointer-events:none;z-index:0;
    }

    .page{
      position:relative;z-index:1;
      max-width:480px;
      margin:0 auto;
      padding:2.5rem 1.75rem 3rem;
      min-height:100vh;
    }

    /* ── BACK NAV ── */
    .back-nav{
      display:flex;align-items:center;gap:8px;
      margin-bottom:2rem;
    }
    .back-nav button{
      display:inline-flex;align-items:center;gap:6px;
      background:none;border:none;cursor:pointer;
      font-size:0.82rem;color:var(--text-muted);
      font-family:var(--font-b);
      transition:color 0.2s;padding:0;
    }
    .back-nav button:hover{color:var(--earth);}
    .nav-dot{
      width:6px;height:6px;border-radius:50%;
      background:var(--stone);
      display:inline-block;
    }
    .nav-step{
      font-size:0.72rem;color:var(--text-muted);
      letter-spacing:0.08em;
    }

    /* ── SECTION HEADER ── */
    .section-label{
      font-size:0.72rem;
      color:var(--text-muted);
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:0.4rem;
    }
    .section-label.ml{font-family:var(--font-ml);text-transform:none;letter-spacing:0.03em;font-size:0.78rem;}
    .section-label.hi{font-family:var(--font-hi);text-transform:none;letter-spacing:0.03em;font-size:0.78rem;}

    .section-title{
      font-family:var(--font-d);
      font-size:2rem;font-weight:300;
      color:var(--earth);
      line-height:1.25;
      margin-bottom:0.4rem;
    }
    .section-title.ml{font-family:var(--font-ml);font-size:1.55rem;font-weight:400;}
    .section-title.hi{font-family:var(--font-hi);font-size:1.55rem;font-weight:400;}

    .section-sub{
      font-size:0.85rem;color:var(--text-secondary);
      line-height:1.65;margin-bottom:1.75rem;
    }
    .section-sub.ml{font-family:var(--font-ml);font-size:0.83rem;}
    .section-sub.hi{font-family:var(--font-hi);font-size:0.83rem;}

    /* ── STRESS TYPE PILLS ── */
    .type-pills{
      display:flex;flex-wrap:wrap;gap:8px;
      margin-bottom:2rem;
    }
    .type-pill{
      padding:7px 14px;
      border:1px solid var(--border);
      border-radius:999px;
      background:rgba(255,255,255,0.7);
      font-size:0.78rem;color:var(--text-secondary);
      cursor:pointer;
      transition:all 0.25s var(--ease);
      font-family:var(--font-b);
    }
    .type-pill.ml{font-family:var(--font-ml);font-size:0.76rem;}
    .type-pill.hi{font-family:var(--font-hi);font-size:0.76rem;}
    .type-pill:hover{
      border-color:var(--stone);
      background:rgba(255,255,255,0.97);
    }
    .type-pill.active{
      background:var(--earth);
      border-color:var(--earth);
      color:#FAF6F0;
    }

    /* ── EMOTION CARD ── */
    .emotion-card{
      background:rgba(255,255,255,0.82);
      border:1px solid var(--border);
      border-radius:18px;
      padding:1.5rem 1.5rem 1.25rem;
      margin-bottom:1rem;
      position:relative;
      overflow:hidden;
      opacity:0;transform:translateY(16px);
      transition:opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .emotion-card.visible{opacity:1;transform:translateY(0);}

    /* Gold left accent */
    .emotion-card::before{
      content:'';
      position:absolute;
      left:0;top:0;bottom:0;
      width:3px;
      background:linear-gradient(to bottom, var(--gold), var(--stone));
      border-radius:3px 0 0 3px;
    }

    /* Kintsugi watermark */
    .emotion-card::after{
      content:'';
      position:absolute;
      right:-20px;bottom:-20px;
      width:100px;height:100px;
      background:radial-gradient(circle, rgba(212,169,74,0.07) 0%, transparent 70%);
      pointer-events:none;
    }

    .emotion-name{
      font-family:var(--font-d);
      font-size:2.2rem;font-weight:400;
      color:var(--earth-deep);
      letter-spacing:-0.01em;
      line-height:1.1;
      margin-bottom:0.2rem;
    }

    .emotion-origin{
      font-size:0.72rem;
      color:var(--text-muted);
      letter-spacing:0.08em;
      margin-bottom:1rem;
      font-style:italic;
    }

    .emotion-divider{
      height:1px;
      background:var(--border);
      margin:1rem 0;
    }

    .emotion-block{margin-bottom:1rem;}
    .emotion-block-label{
      font-size:0.68rem;
      color:var(--gold);
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:0.3rem;
      font-weight:500;
    }
    .emotion-block-label.ml{font-family:var(--font-ml);text-transform:none;letter-spacing:0.02em;font-size:0.72rem;}
    .emotion-block-label.hi{font-family:var(--font-hi);text-transform:none;letter-spacing:0.02em;font-size:0.72rem;}

    .emotion-block-text{
      font-size:0.88rem;
      color:var(--text-secondary);
      line-height:1.7;
    }
    .emotion-block-text.ml{font-family:var(--font-ml);font-size:0.86rem;}
    .emotion-block-text.hi{font-family:var(--font-hi);font-size:0.86rem;}

    /* Comfort line */
    .comfort-line{
      background:var(--gold-bg);
      border:1px solid rgba(212,169,74,0.2);
      border-radius:12px;
      padding:12px 16px;
      margin-top:1.25rem;
    }
    .comfort-text{
      font-family:var(--font-hw);
      font-size:1.1rem;
      color:var(--stone-dark);
      line-height:1.5;
    }
    .comfort-text.ml{font-size:1rem;}
    .comfort-text.hi{font-size:1rem;}

    /* ── SECONDARY EMOTIONS ── */
    .also-label{
      font-size:0.72rem;
      color:var(--text-muted);
      letter-spacing:0.1em;
      text-transform:uppercase;
      margin:1.5rem 0 0.75rem;
    }
    .also-label.ml{font-family:var(--font-ml);text-transform:none;letter-spacing:0.02em;font-size:0.76rem;}
    .also-label.hi{font-family:var(--font-hi);text-transform:none;letter-spacing:0.02em;font-size:0.76rem;}

    .secondary-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-bottom:2rem;
    }

    .secondary-card{
      background:rgba(255,255,255,0.7);
      border:1px solid var(--border);
      border-radius:13px;
      padding:12px 14px;
      cursor:pointer;
      transition:all 0.25s var(--ease);
    }
    .secondary-card:hover{
      background:rgba(255,255,255,0.97);
      border-color:var(--stone);
      transform:translateY(-1px);
      box-shadow:0 4px 16px var(--shadow);
    }
    .sec-name{
      font-family:var(--font-d);
      font-size:1.05rem;font-weight:400;
      color:var(--earth);
      display:block;margin-bottom:3px;
    }
    .sec-desc{
      font-size:0.72rem;color:var(--text-muted);
      line-height:1.4;display:block;
    }
    .sec-desc.ml{font-family:var(--font-ml);font-size:0.7rem;}
    .sec-desc.hi{font-family:var(--font-hi);font-size:0.7rem;}

    /* ── NEXT STEP BTN ── */
    .next-btn{
      display:flex;align-items:center;justify-content:space-between;
      width:100%;
      padding:15px 20px;
      background:var(--earth);
      border:none;
      border-radius:14px;
      cursor:pointer;
      color:#FAF6F0;
      font-family:var(--font-b);
      font-size:0.9rem;font-weight:500;
      transition:all 0.3s var(--ease);
      margin-top:0.5rem;
    }
    .next-btn:hover{
      background:var(--earth-deep);
      transform:translateY(-1px);
      box-shadow:0 6px 20px rgba(60,40,20,0.18);
    }
    .next-btn:active{transform:translateY(0);}
    .next-btn.ml{font-family:var(--font-ml);}
    .next-btn.hi{font-family:var(--font-hi);}

    /* ── EMPTY STATE ── */
    .empty-state{
      text-align:center;
      padding:3rem 1rem;
      color:var(--text-muted);
    }
    .empty-state p{font-size:0.88rem;line-height:1.7;}

    /* fade in stagger for secondary cards */
    .secondary-card{
      opacity:0;transform:translateY(10px);
      animation:none;
    }
    .secondary-card.visible{
      animation:cardIn 0.4s var(--ease) forwards;
    }
    @keyframes cardIn{
      to{opacity:1;transform:translateY(0);}
    }

    @media(max-width:380px){
      .page{padding:2rem 1.25rem 2.5rem;}
      .emotion-name{font-size:1.8rem;}
      .secondary-grid{grid-template-columns:1fr;}
    }
  /* ── BOTTOM NAVIGATION ── */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  background:var(--cream);
  border-top:1px solid var(--border);
  padding:0.6rem 0;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:100;
  box-shadow:0 -2px 8px var(--shadow);
}
.bottom-nav a{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  text-decoration:none;
  color:var(--text-muted);
  font-size:0.7rem;
  padding:0.5rem 0.8rem;
  border-radius:8px;
  transition:all 0.2s var(--ease);
}
.bottom-nav a:hover{color:var(--text-secondary);}
.bottom-nav a.active{
  color:var(--earth);
  background:rgba(212,169,74,0.1);
  font-weight:500;
}
.bottom-nav-icon{font-size:1.2rem;}
body{padding-bottom:4.5rem;}
  </style>
</head>
<body>
<div class="page">

  <!-- Back nav -->
  <div class="back-nav">
    <button onclick="history.back()">← <span id="back-label">Back</span></button>
    <span style="flex:1"></span>
    <span class="nav-dot"></span>
    <span class="nav-step" id="step-label">Step 2 of 10</span>
  </div>

  <!-- Header -->
  <p class="section-label" id="section-label">Name it to tame it</p>
  <h1 class="section-title" id="section-title">What is this feeling, exactly?</h1>
  <p class="section-sub" id="section-sub">Research shows that precisely naming an emotion reduces its intensity. Find the word for what you carry.</p>

  <!-- Stress type pills -->
  <div class="type-pills" id="type-pills"></div>

  <!-- Primary emotion card -->
  <div class="emotion-card" id="emotion-card">
    <div class="empty-state">
      <p id="empty-text">Choose what you are feeling above to find its name.</p>
    </div>
  </div>

  <!-- Secondary emotions -->
  <p class="also-label" id="also-label" style="display:none;"></p>
  <div class="secondary-grid" id="secondary-grid"></div>

  <!-- Next step -->
  <button class="next-btn" id="next-btn" style="display:none;" onclick="goNext()">
    <span id="next-label">Continue — what's happening in your body</span>
    <span>→</span>
  </button>

</div>
<!-- ══ BOTTOM NAVIGATION ══ -->
<nav class="bottom-nav" id="bottom-nav">
  <a href="index.html" id="nav-home"><span class="bottom-nav-icon">🏠</span>Home</a>

</nav>

        {name:'Vicarious grief', desc:'രക്ഷിക്കാൻ കഴിയാതിരുന്നതിൽ ദുഃഖം'},

      ]
    },
    hi: {
      name:'करुणा की थकान',

    alsoLabel:'ഒപ്പം ഇവയും അനുഭവപ്പെടുന്നുണ്ടാകാം',
    nextLabel:'തുടരുക — ശരീരത്തിൽ എന്ത് സംഭവിക്കുന്നു →',
    pills:{
      exam:'പരീക്ഷ സമ്മർദ്ദം', clinical:'Clinical അനുഭവം',
      enough:'മതിയാകുന്നില്ല', exhausted:'ക്ഷീണം',
      relationship:'ബന്ധ വേദന', unknown:'അനിശ്ചിതത്വം'
    }
  },
  hi: {
    back:'वापस', step:'चरण 2 / 10',
    sectionLabel:'नाम दो, ताकत घटाओ',
    sectionTitle:'यह भावना ठीक-ठीक क्या है?',
    sectionSub:'शोध बताता है कि किसी भावना को सटीक नाम देने से उसकी तीव्रता कम होती है।',
    empty:'ऊपर से कुछ चुनें।',
    alsoLabel:'शायद यह भी महसूस हो रहा है',
    nextLabel:'आगे बढ़ें — शरीर में क्या हो रहा है →',
    pills:{
      exam:'पढ़ाई का दबाव', clinical:'Clinical अनुभव',
      enough:'काफी नहीं हूँ', exhausted:'थकान',
      relationship:'रिश्ते का दर्द', unknown:'बस overwhelmed'
    }
  }
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let lang = localStorage.getItem('horegallu-lang') || 'en';
let selectedKey = localStorage.getItem('horegallu-stress') || null;

window.addEventListener('DOMContentLoaded', ()=>{
  renderUI();
  if(selectedKey) selectType(selectedKey);
});

function renderUI(){
  const u = UI[lang];
  const lc = lang === 'ml' ? 'ml' : lang === 'hi' ? 'hi' : '';

  document.getElementById('back-label').textContent = u.back;
  document.getElementById('step-label').textContent = u.step;

  const sl = document.getElementById('section-label');
  sl.textContent = u.sectionLabel;
  sl.className = 'section-label ' + lc;

  const st = document.getElementById('section-title');
  st.textContent = u.sectionTitle;
  st.className = 'section-title ' + lc;

  const ss = document.getElementById('section-sub');
  ss.textContent = u.sectionSub;
  ss.className = 'section-sub ' + lc;

  document.getElementById('empty-text').textContent = u.empty;

  // Pills
  const pillsEl = document.getElementById('type-pills');
  pillsEl.innerHTML = '';
  Object.entries(u.pills).forEach(([key, label])=>{
    const btn = document.createElement('button');
    btn.className = 'type-pill ' + lc;
    btn.textContent = label;
    btn.dataset.key = key;
    btn.onclick = () => selectType(key);
    pillsEl.appendChild(btn);
  });
}

function selectType(key){
  selectedKey = key;
  localStorage.setItem('horegallu-stress', key);

  // Update pills
  document.querySelectorAll('.type-pill').forEach(p=>{
    p.classList.toggle('active', p.dataset.key === key);
  });

  // Get data
  const emotion = EMOTIONS[key][lang];
  const u = UI[lang];
  const lc = lang === 'ml' ? 'ml' : lang === 'hi' ? 'hi' : '';

  // Build primary card
  const card = document.getElementById('emotion-card');
  card.classList.remove('visible');
  card.innerHTML = `
    <div class="emotion-name">${emotion.name}</div>
    <div class="emotion-origin">${emotion.origin}</div>
    <div class="emotion-divider"></div>
    <div class="emotion-block">
      <p class="emotion-block-label ${lc}">What it is</p>
      <p class="emotion-block-text ${lc}">${emotion.what}</p>
    </div>
    <div class="emotion-block">
      <p class="emotion-block-label ${lc}">Why it happens</p>
      <p class="emotion-block-text ${lc}">${emotion.why}</p>
    </div>
    <div class="comfort-line">
      <p class="comfort-text ${lc}">${emotion.comfort}</p>
    </div>
  `;

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ card.classList.add('visible'); });
  });

  // Also label
  const alsoLabel = document.getElementById('also-label');
  alsoLabel.textContent = u.alsoLabel;
  alsoLabel.className = 'also-label ' + lc;
  alsoLabel.style.display = 'block';

  // Secondary cards
  const grid = document.getElementById('secondary-grid');
  grid.innerHTML = '';
  emotion.also.forEach((item, i)=>{
    const c = document.createElement('div');
    c.className = 'secondary-card';
    c.innerHTML = `
      <span class="sec-name">${item.name}</span>
      <span class="sec-desc ${lc}">${item.desc}</span>
    `;
    grid.appendChild(c);
    setTimeout(()=>c.classList.add('visible'), 100 + i*80);
  });

  // Next btn
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = '';
  const span = document.createElement('span');
  span.textContent = u.nextLabel;
  nextBtn.appendChild(span);
  nextBtn.className = 'next-btn ' + lc;
  nextBtn.style.display = 'flex';
}

function goNext(){
  // name-it → stress-translated
  window.location.href = 'stress-translated.html';
}

// Set active nav on load
window.addEventListener('DOMContentLoaded', function(){
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.bottom-nav a').forEach(a => {
    const href = a.getAttribute('href');
    if(href === currentPage || (currentPage === '' && href === 'index.html')) {
      a.classList.add('active');
    }
  });
});
</script>
