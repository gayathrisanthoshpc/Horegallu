<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horegallu</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+Malayalam:wght@300;400;500&family=Noto+Sans+Devanagari:wght@300;400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --stone:       #C4A882;
      --stone-light: #E8DCCF;
      --stone-dark:  #8B6F52;
      --earth:       #6B4F3A;
      --earth-deep:  #3D2B1F;
      --cream:       #FAF6F0;
      --cream-warm:  #F2EBE0;
      --gold:        #D4A94A;
      --gold-light:  #F0CC7A;
      --sage:        #7A8C6E;
      --text-primary:   #2C2420;
      --text-secondary: #6B5A4E;
      --text-muted:     #9E8A7A;
      --border:      rgba(139,111,82,0.18);
      --shadow:      rgba(60,40,20,0.08);
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-b: 'DM Sans', sans-serif;
      --font-hw: 'Caveat', cursive;
      --font-ml: 'Noto Sans Malayalam', sans-serif;
      --font-hi: 'Noto Sans Devanagari', sans-serif;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;}
    body{
      font-family:var(--font-b);
      background:var(--cream);
      color:var(--text-primary);
      min-height:100vh;
      overflow-x:hidden;
      position:relative;
    }

    /* ── DUST PARTICLES ── */
    #dust-canvas{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:0.55;
    }

    /* ── BACKGROUND ── */
    .bg-glow{
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse 75% 55% at 18% 18%, rgba(196,168,130,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 55% 75% at 82% 82%, rgba(193,101,74,0.07) 0%, transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .app{position:relative;z-index:1;min-height:100vh;}

    /* ── SCREENS ── */
    .screen{
      display:none;
      flex-direction:column;
      min-height:100vh;
    }
    .screen.active{display:flex;}
    .screen.fade-in{animation:fadeUp 0.6s var(--ease) both;}
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(18px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* ══════════════════════════════
       LANGUAGE SCREEN
    ══════════════════════════════ */
    #screen-lang{
      justify-content:center;
      align-items:center;
      padding:2.5rem 2rem;
      gap:0;
    }

    .lang-stone{margin-bottom:1.6rem;}

    .stone-group{
      transform-origin:140px 120px;
      animation:stoneBreathe 5s ease-in-out infinite;
    }
    @keyframes stoneBreathe{
      0%,100%{transform:scale(1);}
      45%{transform:scale(1.025);}
      55%{transform:scale(1.025);}
    }

    .lang-title{
      font-family:var(--font-d);
      font-size:2.9rem;
      font-weight:300;
      color:var(--earth);
      letter-spacing:-0.02em;
      text-align:center;
      margin-bottom:0.15rem;
    }

    .lang-prompt{
      text-align:center;
      margin-bottom:2.2rem;
    }
    .lang-prompt p{
      font-size:0.8rem;
      color:var(--text-muted);
      line-height:2.2;
      letter-spacing:0.03em;
    }
    .lang-prompt .ml{font-family:var(--font-ml);}
    .lang-prompt .hi{font-family:var(--font-hi);}

    .lang-buttons{
      display:flex;
      flex-direction:column;
      gap:11px;
      width:100%;
      max-width:290px;
    }

    .lang-btn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:17px 20px;
      background:rgba(255,255,255,0.78);
      border:1px solid var(--border);
      border-radius:18px;
      cursor:pointer;
      transition:all 0.3s var(--ease);
      position:relative;
      overflow:hidden;
    }
    .lang-btn::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(212,169,74,0.08),transparent 60%);
      opacity:0;
      transition:opacity 0.3s;
    }
    .lang-btn:hover{
      background:rgba(255,255,255,0.97);
      border-color:var(--stone);
      transform:translateY(-2px);
      box-shadow:0 8px 28px var(--shadow);
    }
    .lang-btn:hover::before{opacity:1;}
    .lang-btn:active{transform:translateY(0) scale(0.99);}

    .lang-btn-name{font-size:1.05rem;font-weight:500;color:var(--earth-deep);display:block;}
    .lang-btn-native{font-size:0.77rem;color:var(--text-muted);display:block;margin-top:2px;}
    .lang-btn-native.ml{font-family:var(--font-ml);}
    .lang-btn-native.hi{font-family:var(--font-hi);}
    .lang-arrow{font-size:1.1rem;color:var(--stone);transition:transform 0.2s;}
    .lang-btn:hover .lang-arrow{transform:translateX(5px);}

    .lang-foot{margin-top:2rem;text-align:center;}
    .lang-foot p{font-size:0.69rem;color:var(--text-muted);letter-spacing:0.07em;}

    /* ══════════════════════════════
       OPENING SCREEN
    ══════════════════════════════ */
    #screen-opening{
      padding:2.5rem 2rem 2rem;
      max-width:480px;
      margin:0 auto;
      width:100%;
      justify-content:space-between;
    }

    .open-top{display:flex;flex-direction:column;gap:0.2rem;}

    .app-name{
      font-family:var(--font-d);
      font-size:2.5rem;
      font-weight:300;
      color:var(--earth);
      letter-spacing:-0.02em;
      line-height:1;
    }
    .app-name.ml{font-family:var(--font-ml);font-size:1.9rem;font-weight:400;}
    .app-name.hi{font-family:var(--font-hi);font-size:1.9rem;font-weight:400;}

    .app-tagline{
      font-size:0.76rem;
      color:var(--text-muted);
      letter-spacing:0.09em;
      text-transform:uppercase;
      margin-top:0.35rem;
    }
    .app-tagline.ml{font-family:var(--font-ml);text-transform:none;letter-spacing:0.02em;font-size:0.82rem;}
    .app-tagline.hi{font-family:var(--font-hi);text-transform:none;letter-spacing:0.02em;font-size:0.82rem;}

    /* Stone section */
    .stone-section{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:1rem 0 0.5rem;
      flex:1;
      position:relative;
    }

    .main-stone-svg{
      width:min(250px,66vw);
      filter:drop-shadow(0 12px 32px rgba(60,40,20,0.13));
    }

    .hw-note{
      font-family:var(--font-hw);
      font-size:1.1rem;
      color:var(--stone-dark);
      text-align:center;
      margin-top:0.6rem;
      min-height:1.6rem;
      opacity:0;
      transform:translateY(6px);
      transition:opacity 0.6s ease, transform 0.6s ease;
    }
    .hw-note.visible{opacity:1;transform:translateY(0);}

    .main-question{text-align:center;margin:0.8rem 0 1.2rem;}
    .question-text{
      font-family:var(--font-d);
      font-size:1.65rem;
      font-weight:400;
      font-style:italic;
      color:var(--earth-deep);
      line-height:1.35;
    }
    .question-text.ml{font-family:var(--font-ml);font-style:normal;font-size:1.2rem;}
    .question-text.hi{font-family:var(--font-hi);font-style:normal;font-size:1.2rem;}

    /* Options */
    .options-grid{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:1.5rem;
    }

    .option-btn{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 15px;
      background:rgba(255,255,255,0.72);
      border:1px solid var(--border);
      border-radius:13px;
      cursor:pointer;
      text-align:left;
      position:relative;
      overflow:hidden;
      transition:background 0.25s, border-color 0.25s, box-shadow 0.25s;
      will-change:transform,opacity;
    }
    .option-btn::before{
      content:'';
      position:absolute;
      left:0;top:0;bottom:0;
      width:3px;
      background:var(--gold);
      transform:scaleY(0);
      transition:transform 0.22s ease;
      border-radius:3px 0 0 3px;
    }
    .option-btn:hover{
      background:rgba(255,255,255,0.97);
      border-color:var(--stone);
      box-shadow:0 4px 18px var(--shadow);
    }
    .option-btn:hover::before{transform:scaleY(1);}

    .option-btn.dropping{
      animation:weightDrop 0.55s var(--ease) forwards;
    }
    .option-btn.floating-away{
      animation:floatAway 0.45s var(--ease) forwards;
    }
    @keyframes weightDrop{
      0%{transform:translateY(0);opacity:1;}
      40%{transform:translateY(8px) scale(0.97);opacity:0.8;}
      100%{transform:translateY(60px) scale(0.9);opacity:0;}
    }
    @keyframes floatAway{
      0%{transform:translateY(0);opacity:1;}
      100%{transform:translateY(-20px);opacity:0;}
    }

    .option-icon{
      width:33px;height:33px;
      border-radius:50%;
      background:var(--cream-warm);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      font-size:15px;
      transition:transform 0.2s;
    }
    .option-btn:hover .option-icon{transform:scale(1.08);}

    .option-text{flex:1;}
    .option-main{
      font-size:0.9rem;font-weight:500;
      color:var(--text-primary);
      display:block;line-height:1.3;
    }
    .option-main.ml{font-family:var(--font-ml);font-size:0.88rem;}
    .option-main.hi{font-family:var(--font-hi);font-size:0.88rem;}

    .option-sub{
      font-size:0.71rem;color:var(--text-muted);
      display:block;margin-top:2px;line-height:1.4;
    }
    .option-sub.ml{font-family:var(--font-ml);font-size:0.7rem;}
    .option-sub.hi{font-family:var(--font-hi);font-size:0.7rem;}

    .option-arrow{
      font-size:13px;color:var(--text-muted);
      transition:transform 0.2s;flex-shrink:0;
    }
    .option-btn:hover .option-arrow{transform:translateX(4px);color:var(--stone-dark);}

    /* Footer */
    .open-footer{
      text-align:center;
      padding-top:0.85rem;
      border-top:1px solid var(--border);
    }
    .lang-switch-btn{
      display:inline-flex;align-items:center;gap:5px;
      font-size:0.73rem;color:var(--text-muted);
      cursor:pointer;background:none;border:none;
      font-family:var(--font-b);padding:3px 0;
      transition:color 0.2s;
    }
    .lang-switch-btn:hover{color:var(--earth);}
    .foot-promise{
      font-size:0.68rem;color:var(--text-muted);
      margin-top:5px;letter-spacing:0.06em;
    }
    .foot-promise.ml{font-family:var(--font-ml);letter-spacing:0.01em;}
    .foot-promise.hi{font-family:var(--font-hi);letter-spacing:0.01em;}

    /* Kintsugi gold crack glow pulse */
    .kintsugi-crack{
      filter:drop-shadow(0 0 3px rgba(212,169,74,0.6));
      animation:crackGlow 3.5s ease-in-out infinite;
    }
    @keyframes crackGlow{
      0%,100%{filter:drop-shadow(0 0 2px rgba(212,169,74,0.4));}
      50%{filter:drop-shadow(0 0 7px rgba(212,169,74,0.9));}
    }

    @media(max-width:380px){
      #screen-opening{padding:2rem 1.25rem 1.75rem;}
      .app-name{font-size:2rem;}
      .question-text{font-size:1.4rem;}
    }

    /* ── BOTTOM NAVIGATION ── */
    .bottom-nav{
      position:fixed;
      bottom:0;left:0;right:0;
      background:var(--cream);
      border-top:1px solid var(--border);
      padding:0.6rem 0;
      display:flex;
      justify-content:space-around;
      align-items:center;
      z-index:100;
      box-shadow:0 -2px 8px var(--shadow);
    }
    .bottom-nav a{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:3px;
      text-decoration:none;
      color:var(--text-muted);
      font-size:0.7rem;
      padding:0.5rem 0.8rem;
      border-radius:8px;
      transition:all 0.2s var(--ease);
    }
    .bottom-nav a:hover{color:var(--text-secondary);}
    .bottom-nav a.active{
      color:var(--earth);
      background:rgba(212,169,74,0.1);
      font-weight:500;
    }
    .bottom-nav-icon{font-size:1.2rem;}
    
    .app{padding-bottom:4.5rem;}
  </style>
</head>

    </div>

    <div class="lang-foot">

  </div>

  <!-- ══ OPENING SCREEN ══ -->
  <div class="screen" id="screen-opening">

    <div class="open-top">

<script>
/* ══════════════════════════════════
   DUST PARTICLES
══════════════════════════════════ */
const canvas = document.getElementById('dust-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticle(){
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8 + 0.4,
    vx: (Math.random() - 0.5) * 0.18,
    vy: (Math.random() - 0.7) * 0.12,
    o: Math.random() * 0.35 + 0.05,
    life: Math.random() * 300 + 200,
    age: 0
  };
}

for(let i=0;i<55;i++) particles.push(createParticle());

function animateDust(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.age++;
    p.x += p.vx;
    p.y += p.vy;
    const fade = p.age < 30 ? p.age/30 : p.age > p.life-30 ? (p.life-p.age)/30 : 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(196,168,130,${p.o * fade})`;
    ctx.fill();
    if(p.age >= p.life || p.x < -10 || p.x > canvas.width+10 || p.y < -10 || p.y > canvas.height+10){
      particles[i] = createParticle();
    }
  });
  requestAnimationFrame(animateDust);
}
animateDust();

function applyPosture(key){

  const armL = document.getElementById('p-arm-l');
  const armR = document.getElementById('p-arm-r');

/* ══════════════════════════════════
   STATE & LANG
══════════════════════════════════ */
let lang = localStorage.getItem('horegallu-lang') || null;

window.addEventListener('DOMContentLoaded', ()=>{
  if(lang && C[lang]){ applyLang(lang); showScreen('screen-opening'); }
  else showScreen('screen-lang');

  // Set active nav
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.bottom-nav a').forEach(a => {
    a.classList.remove('active');
    if(a.href.endsWith(currentPage)) a.classList.add('active');
  });
});

function setLang(l){
  lang = l;
  localStorage.setItem('horegallu-lang', l);
  applyLang(l);
  showScreen('screen-opening');
}

function switchLang(){
  localStorage.removeItem('horegallu-lang');
  lang = null;
  showScreen('screen-lang');
}

function applyLang(l){
  const c = C[l];
  const el = (id) => document.getElementById(id);

  el('app-name').textContent = c.name;
  el('app-name').className = 'app-name ' + (c.nc||'');
  el('app-tagline').textContent = c.tagline;
  el('app-tagline').className = 'app-tagline ' + (c.tc||'');
  el('question-text').textContent = c.question;
  el('question-text').className = 'question-text ' + (c.qc||'');
  el('lang-switch-label').textContent = c.switchLabel;
  el('foot-promise').textContent = c.promise;
  el('foot-promise').className = 'foot-promise ' + (c.pc||'');

  const grid = el('options-grid');
  grid.innerHTML = '';
  c.options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.key = o.key;
    btn.innerHTML = `
      <div class="option-icon">${o.icon}</div>
      <div class="option-text">
        <span class="option-main ${c.nc||''}">${o.text}</span>
        <span class="option-sub ${c.nc||''}">${o.sub}</span>
      </div>
      <span class="option-arrow">→</span>`;
    btn.addEventListener('click', () => handleOptionClick(btn, o.key, o.note, o.posture));
    grid.appendChild(btn);
  });
}

/* ══════════════════════════════════
   OPTION CLICK — animate then navigate
══════════════════════════════════ */
function handleOptionClick(clickedBtn, key, note, posture){
  const allBtns = document.querySelectorAll('.option-btn');

  // Save stress type for destination pages to use
  localStorage.setItem('horegallu_stress', key);

  // Apply posture change
  applyPosture(posture);

  // Show handwritten note
  const noteEl = document.getElementById('hw-note');
  noteEl.classList.remove('visible');
  noteEl.textContent = note;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{ noteEl.classList.add('visible'); });
  });

  // Animate: chosen drops, others float away
  allBtns.forEach(btn => {
    if(btn === clickedBtn){
      btn.classList.add('dropping');
    } else {
      btn.classList.add('floating-away');
    }
  });

  // After animation completes, navigate to the real page
  setTimeout(()=>{
    window.location.href = ROUTES[key] || 'talk.html';
  }, 580);
}

/* ══════════════════════════════════
   SCREEN NAV
══════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active','fade-in');
  });
  const t = document.getElementById(id);
  if(t){
    t.classList.add('active');
    requestAnimationFrame(()=>t.classList.add('fade-in'));
    window.scrollTo(0,0);
  }
}
